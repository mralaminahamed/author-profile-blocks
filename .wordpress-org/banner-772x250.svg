<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
	<!-- Gradient background -->
	<defs>
		<linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#1e4d92" />
			<stop offset="100%" stop-color="#2271b1" />
		</linearGradient>

		<!-- Frosted glass effect -->
		<filter id="blur-filter" x="-50%" y="-50%" width="200%" height="200%">
			<feGaussianBlur in="SourceGraphic" stdDeviation="10" />
		</filter>

		<!-- Title gradient -->
		<linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#ffffff" />
			<stop offset="100%" stop-color="#f0f6fc" />
		</linearGradient>
	</defs>

	<!-- Main background -->
	<rect width="772" height="250" fill="url(#bg-gradient)" />

	<!-- Decorative blurred shapes for glassmorphism effect -->
	<circle cx="100" cy="50" r="120" fill="#4d8ac8" opacity="0.3" filter="url(#blur-filter)" />
	<circle cx="650" cy="200" r="100" fill="#90c2ef" opacity="0.2" filter="url(#blur-filter)" />
	<circle cx="400" cy="280" r="150" fill="#1a3a6a" opacity="0.15" filter="url(#blur-filter)" />

	<!-- Glass card container -->
	<rect x="176" y="50" width="420" height="150" rx="20"
		  fill="rgba(255, 255, 255, 0.15)"
		  stroke="rgba(255, 255, 255, 0.5)"
		  stroke-width="1" />

	<!-- Plugin name with gradient -->
	<text x="386" y="100" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="url(#title-gradient)" text-anchor="middle">Author Profile Showcase</text>

	<!-- Modern tagline -->
	<text x="386" y="140" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Elegant author profiles for WordPress</text>

	<!-- Stylized author icon with glassmorphism -->
	<g transform="translate(86, 75)">
		<circle cx="40" cy="40" r="40" fill="rgba(255, 255, 255, 0.2)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1" />
		<circle cx="40" cy="30" r="15" fill="rgba(255, 255, 255, 0.9)" />
		<path d="M15,70 Q40,50 65,70" stroke="rgba(255, 255, 255, 0.9)" stroke-width="5" fill="none" stroke-linecap="round" />
	</g>

	<!-- Right side decoration - overlapping circles -->
	<g transform="translate(600, 95)">
		<circle cx="0" cy="0" r="25" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1" />
		<circle cx="20" cy="20" r="25" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1" />
		<circle cx="-20" cy="20" r="15" fill="rgba(255, 255, 255, 0.2)" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1" />
	</g>

	<!-- Version badge -->
	<g transform="translate(650, 30)">
		<rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.5)" stroke-width="1" />
		<text x="40" y="19" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">v1.0.0</text>
	</g>
</svg>
