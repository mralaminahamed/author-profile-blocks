<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <!-- Panel glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- Card shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Dot pattern -->
    <pattern id="dots" x="234" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="2" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="772" height="250" fill="url(#bg)"/>

  <!-- Dot grid (right panel) -->
  <rect x="234" y="0" width="538" height="250" fill="url(#dots)"/>

  <!-- Left panel -->
  <rect x="0" y="0" width="231" height="250" fill="#090e1e"/>
  <!-- Glow -->
  <ellipse cx="115.5" cy="125" rx="106.26" ry="106.26" fill="url(#glow)"/>

  <!-- Separator -->
  <rect x="231" y="0" width="3" height="250" fill="#6366f1"/>

  <!-- Back card -->
  <rect x="55" y="80" width="161" height="130" rx="13" fill="#312e81" filter="url(#shadow)"/>
  <!-- Front card -->
  <rect x="35" y="60" width="161" height="130" rx="13" fill="#4f46e5"/>
  <!-- Shimmer -->
  <rect x="35" y="60" width="161" height="36" rx="13" fill="url(#shimmer)"/>

  <!-- Avatar circle -->
  <circle cx="80" cy="114" r="26" fill="#818cf8"/>
  <!-- Head -->
  <circle cx="80" cy="110" r="9" fill="#ffffff"/>
  <!-- Shoulders -->
  <ellipse cx="80" cy="124" rx="15" ry="8" fill="#ffffff"/>

  <!-- Name line -->
      <rect x="121" y="99" width="58" height="7" rx="3" fill="#ffffff"/>
  <!-- Subtitle lines -->
  <rect x="121" y="119" width="46" height="7" rx="3" fill="#c7d2fe"/>
  <rect x="121" y="138" width="46" height="7" rx="3" fill="#c7d2fe"/>
  <!-- Social dots -->
    <circle cx="83" cy="164" r="6" fill="#a5b4fc"/>
    <circle cx="105" cy="164" r="6" fill="#a5b4fc"/>
    <circle cx="128" cy="164" r="6" fill="#a5b4fc"/>
  
  <!-- Title -->
  <text x="260" y="106"
        font-family="Liberation Sans, Arial, sans-serif" font-weight="bold"
        font-size="40" fill="#f8fafc">Author Profile Blocks</text>

  <!-- Underline -->
    <rect x="260" y="113" width="482" height="4" rx="2" fill="#6366f1"/>

  <!-- Pills -->
        <rect x="260" y="139" width="128" height="33" rx="16" fill="#4f46e5"/>
    <text x="270" y="161"
          font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#ffffff">Profile Block</text>
          <rect x="394" y="139" width="111" height="33" rx="16"
          fill="#1e2545" fill-opacity="0.55" stroke="#4a5080" stroke-width="1"/>
    <text x="404" y="161"
          font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#94a3b8">Author Grid</text>
          <rect x="511" y="139" width="103" height="33" rx="16"
          fill="#1e2545" fill-opacity="0.55" stroke="#4a5080" stroke-width="1"/>
    <text x="521" y="161"
          font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#94a3b8">Team Cards</text>
          <rect x="620" y="139" width="119" height="33" rx="16"
          fill="#1e2545" fill-opacity="0.55" stroke="#4a5080" stroke-width="1"/>
    <text x="630" y="161"
          font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#94a3b8">Social Links</text>
          <rect x="745" y="139" width="103" height="33" rx="16"
          fill="#1e2545" fill-opacity="0.55" stroke="#4a5080" stroke-width="1"/>
    <text x="755" y="161"
          font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#94a3b8">Responsive</text>
    </svg>
