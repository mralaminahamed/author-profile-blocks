<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
	<defs>
		<!-- Gradients and filters -->
		<linearGradient id="editor-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#f9f9f9" />
			<stop offset="100%" stop-color="#f0f0f1" />
		</linearGradient>
		<linearGradient id="sidebar-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#23282d" />
			<stop offset="100%" stop-color="#32373c" />
		</linearGradient>
		<linearGradient id="block-border-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#007cba" />
			<stop offset="100%" stop-color="#0073aa" />
		</linearGradient>
		<filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
		</filter>
		<filter id="glass-effect" x="-10%" y="-10%" width="120%" height="120%">
			<feGaussianBlur in="SourceGraphic" stdDeviation="1" />
		</filter>
	</defs>

	<!-- Background -->
	<rect width="1200" height="900" fill="url(#editor-gradient)" />

	<!-- Editor toolbar -->
	<rect x="0" y="0" width="1200" height="60" fill="#1e1e1e" />
	<circle cx="30" cy="30" r="10" fill="#ff6358" />
	<circle cx="60" cy="30" r="10" fill="#ffbd2d" />
	<circle cx="90" cy="30" r="10" fill="#28c941" />
	<rect x="500" y="20" width="200" height="20" rx="4" fill="#555555" />
	<rect x="1080" y="15" width="30" height="30" rx="4" fill="#555555" />
	<rect x="1130" y="15" width="30" height="30" rx="4" fill="#555555" />

	<!-- Left sidebar -->
	<rect x="0" y="60" width="180" height="840" fill="url(#sidebar-gradient)" />
	<rect x="20" y="100" width="140" height="16" rx="3" fill="#646970" opacity="0.8" />
	<rect x="20" y="140" width="100" height="16" rx="3" fill="#646970" opacity="0.8" />
	<rect x="20" y="180" width="120" height="16" rx="3" fill="#646970" opacity="0.8" />
	<rect x="20" y="220" width="110" height="16" rx="3" fill="#646970" opacity="0.8" />
	<rect x="20" y="260" width="130" height="16" rx="3" fill="#646970" opacity="0.8" />

	<!-- Content area -->
	<rect x="180" y="60" width="780" height="840" fill="#ffffff" />

	<!-- Right sidebar (block settings) -->
	<rect x="960" y="60" width="240" height="840" fill="#f7f7f7" />

	<!-- Document title -->
	<rect x="220" y="100" width="300" height="30" rx="4" fill="#1e1e1e" opacity="0.8" />

	<!-- Author profile block with glassmorphism -->
	<g transform="translate(220, 160)">
		<!-- Block container with shadow -->
		<rect x="0" y="0" width="700" height="400" rx="10"
			  fill="#ffffff"
			  stroke="url(#block-border-gradient)"
			  stroke-width="2"
			  filter="url(#drop-shadow)" />

		<!-- Glassmorphism effect for author container -->
		<rect x="30" y="30" width="640" height="260" rx="8"
			  fill="rgba(247, 250, 252, 0.7)"
			  stroke="rgba(255, 255, 255, 0.8)"
			  stroke-width="1" />

		<!-- Author image -->
		<circle cx="120" cy="110" r="70" fill="#f0f6fc" stroke="#e1e7ed" stroke-width="1" />
		<circle cx="120" cy="90" r="30" fill="#d2dbe5" />
		<path d="M90,150 Q120,120 150,150" stroke="#d2dbe5" stroke-width="8" fill="none" />

		<!-- Author info -->
		<rect x="230" y="60" width="400" height="32" rx="4" fill="#1e1e1e" />
		<text x="240" y="82" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">John Smith</text>

		<rect x="230" y="110" width="300" height="24" rx="4" fill="#0075af" />
		<text x="240" y="128" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">john.smith@example.com</text>

		<rect x="230" y="150" width="420" height="16" rx="3" fill="#606060" />
		<rect x="230" y="180" width="400" height="16" rx="3" fill="#606060" />
		<rect x="230" y="210" width="380" height="16" rx="3" fill="#606060" />

		<!-- More content section with glass effect -->
		<rect x="30" y="310" width="640" height="60" rx="8"
			  fill="rgba(247, 250, 252, 0.5)"
			  stroke="rgba(230, 235, 240, 0.8)"
			  stroke-width="1" />
		<rect x="50" y="325" width="600" height="12" rx="2" fill="#888888" />
		<rect x="50" y="345" width="540" height="12" rx="2" fill="#888888" />
	</g>

	<!-- Block Settings in sidebar -->
	<rect x="980" y="80" width="200" height="40" rx="4" fill="#1e1e1e" />
	<text x="1000" y="106" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Author Profile</text>

	<!-- Inspector controls with glassmorphism -->
	<g transform="translate(980, 140)">
		<rect x="0" y="0" width="200" height="180" rx="6"
			  fill="rgba(255, 255, 255, 0.8)"
			  stroke="rgba(230, 235, 240, 0.8)"
			  stroke-width="1" />

		<text x="15" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Display Settings</text>

		<!-- Toggle controls -->
		<rect x="15" y="40" width="170" height="30" rx="4" fill="rgba(247, 250, 252, 0.7)" />
		<circle cx="25" cy="55" r="8" fill="#0075af" />
		<text x="45" y="60" font-family="Arial, sans-serif" font-size="12" fill="#1e1e1e">Show Image</text>

		<rect x="15" y="80" width="170" height="30" rx="4" fill="rgba(247, 250, 252, 0.7)" />
		<circle cx="25" cy="95" r="8" fill="#0075af" />
		<text x="45" y="100" font-family="Arial, sans-serif" font-size="12" fill="#1e1e1e">Show Email</text>

		<rect x="15" y="120" width="170" height="30" rx="4" fill="rgba(247, 250, 252, 0.7)" />
		<circle cx="25" cy="135" r="8" fill="#0075af" />
		<text x="45" y="140" font-family="Arial, sans-serif" font-size="12" fill="#1e1e1e">Show Description</text>
	</g>

	<g transform="translate(980, 340)">
		<rect x="0" y="0" width="200" height="110" rx="6"
			  fill="rgba(255, 255, 255, 0.8)"
			  stroke="rgba(230, 235, 240, 0.8)"
			  stroke-width="1" />

		<text x="15" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Style Settings</text>

		<!-- Color picker -->
		<rect x="15" y="40" width="170" height="30" rx="4" fill="rgba(247, 250, 252, 0.7)" />
		<rect x="25" y="45" width="20" height="20" rx="3" fill="#ffffff" stroke="#dddddd" stroke-width="1" />
		<text x="55" y="60" font-family="Arial, sans-serif" font-size="12" fill="#1e1e1e">Background Color</text>

		<!-- Alignment control -->
		<rect x="15" y="80" width="170" height="20" rx="4" fill="rgba(247, 250, 252, 0.7)" />
		<rect x="30" y="83" width="14" height="14" rx="2" fill="#0075af" />
		<rect x="55" y="83" width="14" height="14" rx="2" fill="#eeeeee" />
		<rect x="80" y="83" width="14" height="14" rx="2" fill="#eeeeee" />
	</g>
</svg>
