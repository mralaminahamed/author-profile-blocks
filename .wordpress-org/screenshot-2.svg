<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
	<defs>
		<!-- Gradients and filters -->
		<linearGradient id="editor-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#f9f9f9" />
			<stop offset="100%" stop-color="#f0f0f1" />
		</linearGradient>
		<linearGradient id="content-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#fefefe" />
			<stop offset="100%" stop-color="#f8f8f8" />
		</linearGradient>
		<filter id="glass-blur" x="-10%" y="-10%" width="120%" height="120%">
			<feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
		</filter>
		<filter id="shadow-effect" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1" />
		</filter>
		<linearGradient id="panel-header-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#fafbfc" />
			<stop offset="100%" stop-color="#f0f2f5" />
		</linearGradient>
	</defs>

	<!-- Background -->
	<rect width="1200" height="900" fill="url(#editor-gradient)" />

	<!-- Content area -->
	<rect x="0" y="0" width="840" height="900" fill="url(#content-gradient)" />

	<!-- Editor header -->
	<rect x="0" y="0" width="1200" height="60" fill="#1e1e1e" />
	<circle cx="30" cy="30" r="10" fill="#ff6358" />
	<circle cx="60" cy="30" r="10" fill="#ffbd2d" />
	<circle cx="90" cy="30" r="10" fill="#28c941" />
	<rect x="500" y="20" width="200" height="20" rx="4" fill="#555555" />

	<!-- Inspector panel -->
	<rect x="840" y="60" width="360" height="840" fill="#f7f7f7" />

	<!-- Block selector -->
	<rect x="860" y="80" width="320" height="50" rx="8"
		  fill="rgba(255, 255, 255, 0.9)"
		  stroke="rgba(230, 235, 240, 0.9)"
		  stroke-width="1"
		  filter="url(#shadow-effect)" />
	<text x="880" y="112" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e1e1e">Author Profile</text>
	<text x="1140" y="112" font-family="Arial, sans-serif" font-size="18" fill="#999999">▼</text>

	<!-- Panel 1: Display Settings -->
	<g transform="translate(860, 150)">
		<rect x="0" y="0" width="320" height="240" rx="8"
			  fill="rgba(255, 255, 255, 0.9)"
			  stroke="rgba(230, 235, 240, 0.9)"
			  stroke-width="1"
			  filter="url(#shadow-effect)" />

		<!-- Panel header -->
		<rect x="0" y="0" width="320" height="50" rx="8 8 0 0"
			  fill="url(#panel-header-gradient)"
			  stroke="rgba(230, 235, 240, 0.9)"
			  stroke-width="1" />
		<text x="20" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e1e1e">Display Settings</text>
		<text x="295" y="32" font-family="Arial, sans-serif" font-size="16" fill="#555555">▲</text>

		<!-- Toggle controls -->
		<g transform="translate(20, 65)">
			<rect x="0" y="0" width="280" height="36" rx="6" fill="rgba(247, 250, 252, 0.7)" />
			<rect x="0" y="0" width="36" height="36" rx="6 0 0 6" fill="#0075af" />
			<rect x="15" y="15" width="6" height="6" rx="1" fill="#ffffff" />
			<text x="50" y="23" font-family="Arial, sans-serif" font-size="14" fill="#1e1e1e">Show Author Image</text>
		</g>

		<g transform="translate(20, 110)">
			<rect x="0" y="0" width="280" height="36" rx="6" fill="rgba(247, 250, 252, 0.7)" />
			<rect x="0" y="0" width="36" height="36" rx="6 0 0 6" fill="#0075af" />
			<rect x="15" y="15" width="6" height="6" rx="1" fill="#ffffff" />
			<text x="50" y="23" font-family="Arial, sans-serif" font-size="14" fill="#1e1e1e">Show Author Email</text>
		</g>

		<g transform="translate(20, 155)">
			<rect x="0" y="0" width="280" height="36" rx="6" fill="rgba(247, 250, 252, 0.7)" />
			<rect x="0" y="0" width="36" height="36" rx="6 0 0 6" fill="#0075af" />
			<rect x="15" y="15" width="6" height="6" rx="1" fill="#ffffff" />
			<text x="50" y="23" font-family="Arial, sans-serif" font-size="14" fill="#1e1e1e">Show Author Description</text>
		</g>

		<g transform="translate(20, 200)">
			<rect x="0" y="0" width="280" height="36" rx="6" fill="rgba(247, 250, 252, 0.7)" opacity="0.8" />
			<rect x="0" y="0" width="36" height="36" rx="6 0 0 6" fill="#888888" />
			<text x="50" y="23" font-family="Arial, sans-serif" font-size="14" fill="#1e1e1e">Show More Section</text>
		</g>
	</g>

	<!-- Panel 2: Style Settings -->
	<g transform="translate(860, 410)">
		<rect x="0" y="0" width="320" height="200" rx="8"
			  fill="rgba(255, 255, 255, 0.9)"
			  stroke="rgba(230, 235, 240, 0.9)"
			  stroke-width="1"
			  filter="url(#shadow-effect)" />

		<!-- Panel header -->
		<rect x="0" y="0" width="320" height="50" rx="8 8 0 0"
			  fill="url(#panel-header-gradient)"
			  stroke="rgba(230, 235, 240, 0.9)"
			  stroke-width="1" />
		<text x="20" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e1e1e">Style Settings</text>
		<text x="295" y="32" font-family="Arial, sans-serif" font-size="16" fill="#555555">▲</text>

		<!-- Background color -->
		<text x="20" y="80" font-family="Arial, sans-serif" font-size="14" fill="#1e1e1e">Background Color</text>
		<rect x="20" y="90" width="280" height="40" rx="6" fill="rgba(247, 250, 252, 0.7)" />
		<rect x="30" y="100" width="20" height="20" rx="4" fill="#ffffff" stroke="#dddddd" stroke-width="1" />
		<text x="60" y="115" font-family="Arial, sans-serif" font-size="14" fill="#888888">#ffffff</text>

		<!-- Text alignment -->
		<text x="20" y="150" font-family="Arial, sans-serif" font-size="14" fill="#1e1e1e">Text Alignment</text>
		<rect x="20" y="160" width="280" height="36" rx="6" fill="rgba(247, 250, 252, 0.7)" />
		<rect x="30" y="168" width="80" height="20" rx="4" fill="#0075af" />
		<text x="54" y="183" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Left</text>
		<rect x="120" y="168" width="80" height="20" rx="4" fill="rgba(230, 235, 240, 0.9)" />
		<text x="142" y="183" font-family="Arial, sans-serif" font-size="12" fill="#555555">Center</text>
		<rect x="210" y="168" width="80" height="20" rx="4" fill="rgba(230, 235, 240, 0.9)" />
		<text x="233" y="183" font-family="Arial, sans-serif" font-size="12" fill="#555555">Right</text>
	</g>

	<!-- Panel 3: Color Settings -->
	<g transform="translate(860, 630)">
		<rect x="0" y="0" width="320" height="150" rx="8"
			  fill="rgba(255, 255, 255, 0.9)"
			  stroke="rgba(230, 235, 240, 0.9)"
			  stroke-width="1"
			  filter="url(#shadow-effect)" />

		<!-- Panel header -->
		<rect x="0" y="0" width="320" height="50" rx="8 8 0 0"
			  fill="url(#panel-header-gradient)"
			  stroke="rgba(230, 235, 240, 0.9)"
			  stroke-width="1" />
		<text x="20" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e1e1e">Color Settings</text>
		<text x="295" y="32" font-family="Arial, sans-serif" font-size="16" fill="#555555">▼</text>

		<!-- Color palette -->
		<rect x="20" y="70" width="30" height="30" rx="15" fill="#f6f7f7" stroke="#dddddd" stroke-width="1" />
		<rect x="60" y="70" width="30" height="30" rx="15" fill="#f0f6fc" stroke="#dddddd" stroke-width="1" />
		<rect x="100" y="70" width="30" height="30" rx="15" fill="#eaf4fb" stroke="#dddddd" stroke-width="1" />
		<rect x="140" y="70" width="30" height="30" rx="15" fill="#f0f2ea" stroke="#dddddd" stroke-width="1" />
		<rect x="180" y="70" width="30" height="30" rx="15" fill="#f5f5f5" stroke="#dddddd" stroke-width="1" />
		<rect x="220" y="70" width="30" height="30" rx="15" fill="#f8f9fa" stroke="#dddddd" stroke-width="1" />
		<rect x="260" y="70" width="30" height="30" rx="15" fill="#ffffff" stroke="#dddddd" stroke-width="1" />

		<!-- Custom color picker -->
		<rect x="20" y="110" width="280" height="30" rx="4" fill="rgba(247, 250, 252, 0.7)" />
		<text x="40" y="130" font-family="Arial, sans-serif" font-size="14" fill="#555555">Custom Color</text>
		<rect x="260" y="115" width="20" height="20" rx="3" fill="#7e8993" />
	</g>

	<!-- Author Profile Block preview in content area -->
	<g transform="translate(80, 120)">
		<rect x="0" y="0" width="680" height="300" rx="10"
			  fill="#ffffff"
			  stroke="#0075af"
			  stroke-width="2"
			  filter="url(#shadow-effect)" />

		<!-- Author image -->
		<circle cx="100" cy="100" r="60" fill="#f0f6fc" stroke="#e1e7ed" stroke-width="1" />
		<circle cx="100" cy="80" r="25" fill="#d2dbe5" />
		<path d="M70,130 Q100,110 130,130" stroke="#d2dbe5" stroke-width="8" fill="none" />

		<!-- Author info -->
		<text x="200" y="80" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e1e1e">John Smith</text>
		<text x="200" y="120" font-family="Arial, sans-serif" font-size="16" fill="#0075af">john.smith@example.com</text>
		<text x="200" y="160" font-family="Arial, sans-serif" font-size="15" fill="#555555">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</text>
		<text x="200" y="190" font-family="Arial, sans-serif" font-size="15" fill="#555555">Sed do eiusmod tempor incididunt ut labore et dolore.</text>
		<text x="200" y="220" font-family="Arial, sans-serif" font-size="15" fill="#555555">Ut enim ad minim veniam, quis nostrud exercitation.</text>
	</g>
</svg>
