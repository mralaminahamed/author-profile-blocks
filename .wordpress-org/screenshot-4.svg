<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
	<defs>
		<!-- Gradients and filters -->
		<linearGradient id="website-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#ffffff" />
			<stop offset="100%" stop-color="#f9f9f9" />
		</linearGradient>
		<linearGradient id="header-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#ffffff" />
			<stop offset="100%" stop-color="#f5f5f5" />
		</linearGradient>
		<linearGradient id="profile-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#f8f9fa" />
			<stop offset="100%" stop-color="#f0f2f5" />
		</linearGradient>
		<filter id="website-shadow" x="-10%" y="-10%" width="120%" height="120%">
			<feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.1" />
		</filter>
		<filter id="glass-effect" x="-10%" y="-10%" width="120%" height="120%">
			<feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
		</filter>
	</defs>

	<!-- Website background -->
	<rect width="1200" height="900" fill="url(#website-gradient)" />

	<!-- Site header -->
	<rect x="0" y="0" width="1200" height="80" fill="url(#header-gradient)" />
	<rect x="100" y="20" width="200" height="40" rx="4" fill="#23282d" />
	<text x="200" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Site Title</text>

	<!-- Navigation menu -->
	<rect x="500" y="25" width="80" height="30" rx="4" fill="transparent" />
	<text x="540" y="45" font-family="Arial, sans-serif" font-size="14" fill="#23282d" text-anchor="middle">Home</text>

	<rect x="600" y="25" width="80" height="30" rx="4" fill="#0073aa" />
	<text x="640" y="45" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">About</text>

	<rect x="700" y="25" width="80" height="30" rx="4" fill="transparent" />
	<text x="740" y="45" font-family="Arial, sans-serif" font-size="14" fill="#23282d" text-anchor="middle">Blog</text>

	<rect x="800" y="25" width="80" height="30" rx="4" fill="transparent" />
	<text x="840" y="45" font-family="Arial, sans-serif" font-size="14" fill="#23282d" text-anchor="middle">Contact</text>

	<!-- Search icon -->
	<circle cx="950" cy="40" r="15" fill="transparent" stroke="#23282d" stroke-width="2" />
	<line x1="960" y1="50" x2="970" y2="60" stroke="#23282d" stroke-width="2" />

	<!-- Page title -->
	<text x="100" y="130" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#23282d">Meet Our Team</text>
	<text x="100" y="170" font-family="Arial, sans-serif" font-size="18" fill="#555555">Get to know the amazing people behind our success</text>

	<!-- Author profile with glassmorphism -->
	<g transform="translate(100, 220)">
		<!-- Main card with shadow and glass effect -->
		<rect x="0" y="0" width="1000" height="400" rx="15"
			  fill="rgba(255, 255, 255, 0.8)"
			  stroke="rgba(230, 235, 240, 0.9)"
			  stroke-width="1"
			  filter="url(#website-shadow)" />

		<!-- Card inner area with gradient -->
		<rect x="20" y="20" width="960" height="360" rx="10"
			  fill="url(#profile-gradient)"
			  stroke="rgba(255, 255, 255, 0.8)"
			  stroke-width="1" />

		<!-- Author image with glass frame -->
		<g transform="translate(60, 60)">
			<circle cx="90" cy="90" r="90" fill="rgba(255, 255, 255, 0.9)"
					stroke="rgba(230, 235, 240, 0.9)" stroke-width="2" />
			<circle cx="90" cy="90" r="80" fill="#f0f6fc" />
			<circle cx="90" cy="70" r="35" fill="#d2dbe5" />
			<path d="M50,125 Q90,100 130,125" stroke="#d2dbe5" stroke-width="10" fill="none" stroke-linecap="round" />
		</g>

		<!-- Author information -->
		<g transform="translate(300, 50)">
			<text font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#23282d">John Smith</text>
			<rect x="0" y="50" width="180" height="36" rx="18"
				  fill="rgba(0, 115, 170, 0.1)"
				  stroke="rgba(0, 115, 170, 0.3)"
				  stroke-width="1" />
			<text x="90" y="74" font-family="Arial, sans-serif" font-size="14" fill="#0073aa" text-anchor="middle">Lead Developer</text>

			<text x="0" y="110" font-family="Arial, sans-serif" font-size="16" fill="#0073aa">john.smith@example.com</text>

			<text x="0" y="150" font-family="Arial, sans-serif" font-size="16" fill="#555555">John is a senior developer with over 10 years of experience</text>
			<text x="0" y="180" font-family="Arial, sans-serif" font-size="16" fill="#555555">building web applications. He specializes in WordPress</text>
			<text x="0" y="210" font-family="Arial, sans-serif" font-size="16" fill="#555555">development and has contributed to numerous open-source</text>
			<text x="0" y="240" font-family="Arial, sans-serif" font-size="16" fill="#555555">projects. His passion for clean code and performance</text>
			<text x="0" y="270" font-family="Arial, sans-serif" font-size="16" fill="#555555">optimization drives our technical decisions.</text>

			<!-- Social media icons in glass containers -->
			<g transform="translate(0, 310)">
				<circle cx="20" cy="20" r="20" fill="rgba(255, 255, 255, 0.7)"
						stroke="rgba(230, 235, 240, 0.9)" stroke-width="1" />
				<text x="20" y="25" font-family="Arial, sans-serif" font-size="14" fill="#0073aa" text-anchor="middle">in</text>

				<circle cx="70" cy="20" r="20" fill="rgba(255, 255, 255, 0.7)"
						stroke="rgba(230, 235, 240, 0.9)" stroke-width="1" />
				<text x="70" y="25" font-family="Arial, sans-serif" font-size="14" fill="#0073aa" text-anchor="middle">t</text>

				<circle cx="120" cy="20" r="20" fill="rgba(255, 255, 255, 0.7)"
						stroke="rgba(230, 235, 240, 0.9)" stroke-width="1" />
				<text x="120" y="25" font-family="Arial, sans-serif" font-size="14" fill="#0073aa" text-anchor="middle">g</text>
			</g>
		</g>
	</g>

	<!-- More content section with glassmorphism -->
	<g transform="translate(100, 650)">
		<rect x="0" y="0" width="1000" height="200" rx="15"
			  fill="rgba(255, 255, 255, 0.5)"
			  stroke="rgba(230, 235, 240, 0.7)"
			  stroke-width="1"
			  filter="url(#glass-effect)" />

		<text x="40" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#23282d">More About John</text>

		<text x="40" y="80" font-family="Arial, sans-serif" font-size="16" fill="#555555">John has led development teams at several tech companies before joining our organization.</text>
		<text x="40" y="110" font-family="Arial, sans-serif" font-size="16" fill="#555555">He has a Master's degree in Computer Science and regularly speaks at WordPress conferences.</text>
		<text x="40" y="140" font-family="Arial, sans-serif" font-size="16" fill="#555555">In his free time, John enjoys hiking, playing chess, and contributing to open source projects.</text>
		<text x="40" y="170" font-family="Arial, sans-serif" font-size="16" fill="#555555">Connect with John to discuss your next WordPress project or technical challenges.</text>
	</g>
</svg>
