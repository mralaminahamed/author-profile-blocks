<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
	<defs>
		<!-- Gradients and filters -->
		<linearGradient id="admin-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#f9f9f9" />
			<stop offset="100%" stop-color="#f0f0f1" />
		</linearGradient>
		<linearGradient id="sidebar-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#23282d" />
			<stop offset="100%" stop-color="#32373c" />
		</linearGradient>
		<linearGradient id="button-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#2271b1" />
			<stop offset="100%" stop-color="#0073aa" />
		</linearGradient>
		<filter id="admin-shadow" x="-10%" y="-10%" width="120%" height="120%">
			<feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.1" />
		</filter>
	</defs>

	<!-- Background -->
	<rect width="1200" height="900" fill="url(#admin-gradient)" />

	<!-- Admin sidebar -->
	<rect x="0" y="0" width="180" height="900" fill="url(#sidebar-gradient)" />

	<!-- Sidebar menu items -->
	<rect x="20" y="100" width="140" height="30" rx="3" fill="#4e5860" opacity="0.2" />
	<text x="50" y="120" font-family="Arial, sans-serif" font-size="14" fill="#eee" opacity="0.8">Dashboard</text>

	<rect x="20" y="140" width="140" height="30" rx="3" fill="#4e5860" opacity="0.2" />
	<text x="50" y="160" font-family="Arial, sans-serif" font-size="14" fill="#eee" opacity="0.8">Posts</text>

	<rect x="20" y="180" width="140" height="30" rx="3" fill="#4e5860" opacity="0.2" />
	<text x="50" y="200" font-family="Arial, sans-serif" font-size="14" fill="#eee" opacity="0.8">Media</text>

	<rect x="20" y="220" width="140" height="30" rx="3" fill="#0073aa" />
	<text x="50" y="240" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Author Profiles</text>

	<rect x="20" y="260" width="140" height="30" rx="3" fill="#4e5860" opacity="0.2" />
	<text x="50" y="280" font-family="Arial, sans-serif" font-size="14" fill="#eee" opacity="0.8">Pages</text>

	<rect x="20" y="300" width="140" height="30" rx="3" fill="#4e5860" opacity="0.2" />
	<text x="50" y="320" font-family="Arial, sans-serif" font-size="14" fill="#eee" opacity="0.8">Comments</text>

	<!-- Admin header -->
	<rect x="180" y="0" width="1020" height="60" fill="#23282d" />
	<text x="210" y="38" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">WordPress Admin</text>
	<circle cx="1140" cy="30" r="20" fill="#eeeeee" />
	<text x="1140" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">A</text>

	<!-- Page title -->
	<text x="220" y="100" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#23282d">Author Profiles</text>
	<rect x="950" y="70" width="200" height="40" rx="4" fill="url(#button-gradient)" />
	<text x="995" y="96" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Add New</text>
	<text x="980" y="96" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">+</text>

	<!-- Table container with glass effect -->
	<rect x="200" y="130" width="950" height="730" rx="8"
		  fill="rgba(255, 255, 255, 0.8)"
		  stroke="rgba(230, 235, 240, 0.9)"
		  stroke-width="1"
		  filter="url(#admin-shadow)" />

	<!-- Table header -->
	<rect x="200" y="130" width="950" height="50" rx="8 8 0 0" fill="rgba(240, 245, 250, 0.9)" />
	<rect x="220" y="144" width="20" height="20" rx="3" fill="#eeeeee" stroke="#bbbbbb" stroke-width="1" />
	<text x="280" y="158" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#23282d">Image</text>
	<text x="400" y="158" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#23282d">Name</text>
	<text x="620" y="158" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#23282d">Email</text>
	<text x="850" y="158" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#23282d">Description</text>
	<text x="1050" y="158" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#23282d">Date</text>

	<!-- Table rows -->
	<!-- Row 1 -->
	<rect x="200" y="180" width="950" height="80" fill="#ffffff" />
	<rect x="220" y="210" width="20" height="20" rx="3" fill="#eeeeee" stroke="#bbbbbb" stroke-width="1" />
	<circle cx="290" cy="220" r="30" fill="#f0f6fc" stroke="#e1e7ed" stroke-width="1" />
	<circle cx="290" cy="210" r="12" fill="#d2dbe5" />
	<path d="M280,230 Q290,225 300,230" stroke="#d2dbe5" stroke-width="3" fill="none" />

	<text x="400" y="225" font-family="Arial, sans-serif" font-size="14" fill="#23282d">John Smith</text>
	<text x="620" y="225" font-family="Arial, sans-serif" font-size="14" fill="#0073aa">john.smith@example.com</text>
	<text x="850" y="225" font-family="Arial, sans-serif" font-size="14" fill="#555555">Lead developer with 10+ years of experience...</text>
	<text x="1050" y="225" font-family="Arial, sans-serif" font-size="14" fill="#555555">2025-04-10</text>

	<!-- Row 2 -->
	<rect x="200" y="260" width="950" height="80" fill="rgba(247, 247, 247, 0.7)" />
	<rect x="220" y="290" width="20" height="20" rx="3" fill="#eeeeee" stroke="#bbbbbb" stroke-width="1" />
	<circle cx="290" cy="300" r="30" fill="#f0f6fc" stroke="#e1e7ed" stroke-width="1" />
	<circle cx="290" cy="290" r="12" fill="#d2dbe5" />
	<path d="M280,310 Q290,305 300,310" stroke="#d2dbe5" stroke-width="3" fill="none" />

	<text x="400" y="305" font-family="Arial, sans-serif" font-size="14" fill="#23282d">Jane Doe</text>
	<text x="620" y="305" font-family="Arial, sans-serif" font-size="14" fill="#0073aa">jane.doe@example.com</text>
	<text x="850" y="305" font-family="Arial, sans-serif" font-size="14" fill="#555555">UX Designer specializing in user-centered...</text>
	<text x="1050" y="305" font-family="Arial, sans-serif" font-size="14" fill="#555555">2025-04-08</text>

	<!-- Row 3 -->
	<rect x="200" y="340" width="950" height="80" fill="#ffffff" />
	<rect x="220" y="370" width="20" height="20" rx="3" fill="#eeeeee" stroke="#bbbbbb" stroke-width="1" />
	<circle cx="290" cy="380" r="30" fill="#f0f6fc" stroke="#e1e7ed" stroke-width="1" />
	<circle cx="290" cy="370" r="12" fill="#d2dbe5" />
	<path d="M280,390 Q290,385 300,390" stroke="#d2dbe5" stroke-width="3" fill="none" />

	<text x="400" y="385" font-family="Arial, sans-serif" font-size="14" fill="#23282d">Michael Johnson</text>
	<text x="620" y="385" font-family="Arial, sans-serif" font-size="14" fill="#0073aa">michael.j@example.com</text>
	<text x="850" y="385" font-family="Arial, sans-serif" font-size="14" fill="#555555">Marketing specialist with expertise in...</text>
	<text x="1050" y="385" font-family="Arial, sans-serif" font-size="14" fill="#555555">2025-04-05</text>

	<!-- Row 4 -->
	<rect x="200" y="420" width="950" height="80" fill="rgba(247, 247, 247, 0.7)" />
	<rect x="220" y="450" width="20" height="20" rx="3" fill="#eeeeee" stroke="#bbbbbb" stroke-width="1" />
	<circle cx="290" cy="460" r="30" fill="#f0f6fc" stroke="#e1e7ed" stroke-width="1" />
	<circle cx="290" cy="450" r="12" fill="#d2dbe5" />
	<path d="M280,470 Q290,465 300,470" stroke="#d2dbe5" stroke-width="3" fill="none" />

	<text x="400" y="465" font-family="Arial, sans-serif" font-size="14" fill="#23282d">Sarah Williams</text>
	<text x="620" y="465" font-family="Arial, sans-serif" font-size="14" fill="#0073aa">sarah.w@example.com</text>
	<text x="850" y="465" font-family="Arial, sans-serif" font-size="14" fill="#555555">Content strategist focused on creating...</text>
	<text x="1050" y="465" font-family="Arial, sans-serif" font-size="14" fill="#555555">2025-04-02</text>

	<!-- Pagination -->
	<rect x="200" y="820" width="950" height="40" fill="rgba(240, 245, 250, 0.5)" />
	<rect x="500" y="825" width="30" height="30" rx="3" fill="#0073aa" />
	<text x="515" y="844" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
	<rect x="540" y="825" width="30" height="30" rx="3" fill="rgba(240, 245, 250, 0.9)" stroke="#dddddd" stroke-width="1" />
	<text x="555" y="844" font-family="Arial, sans-serif" font-size="14" fill="#23282d" text-anchor="middle">2</text>
	<rect x="580" y="825" width="30" height="30" rx="3" fill="rgba(240, 245, 250, 0.9)" stroke="#dddddd" stroke-width="1" />
	<text x="595" y="844" font-family="Arial, sans-serif" font-size="14" fill="#23282d" text-anchor="middle">3</text>
</svg>
