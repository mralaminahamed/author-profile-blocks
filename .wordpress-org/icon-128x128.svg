<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shimmer-128" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow-128" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#1e1b4b"/>

  <!-- Back card -->
  <rect x="28" y="28" width="94" height="84" rx="8"
        fill="#312e81" filter="url(#shadow-128)"/>

  <!-- Front card -->
  <rect x="16" y="26" width="94" height="84" rx="8" fill="#4f46e5"/>
  <!-- Shimmer -->
  <rect x="16" y="26" width="94" height="23" rx="8"
        fill="url(#shimmer-128)"/>

  <!-- Avatar circle -->
  <circle cx="42" cy="62" r="16" fill="#818cf8"/>
  <!-- Head -->
  <circle cx="42" cy="60" r="6" fill="#ffffff"/>
  <!-- Shoulders -->
  <ellipse cx="42" cy="68" rx="9" ry="5" fill="#ffffff"/>

  <!-- Name line -->
  <rect x="64" y="51" width="38" height="5" rx="2" fill="#ffffff"/>
  <!-- Subtitle lines -->
  <rect x="64" y="64" width="30" height="5" rx="2" fill="#c7d2fe"/>
  <rect x="64" y="76" width="30" height="5" rx="2" fill="#c7d2fe"/>
</svg>
