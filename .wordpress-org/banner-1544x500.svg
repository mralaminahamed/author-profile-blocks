<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <!-- Panel glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- Card shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Dot pattern -->
    <pattern id="dots" x="469" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="2" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bg)"/>

  <!-- Dot grid (right panel) -->
  <rect x="469" y="0" width="1075" height="500" fill="url(#dots)"/>

  <!-- Left panel -->
  <rect x="0" y="0" width="463" height="500" fill="#090e1e"/>
  <!-- Glow -->
  <ellipse cx="231.5" cy="250" rx="212.98" ry="212.98" fill="url(#glow)"/>

  <!-- Separator -->
  <rect x="463" y="0" width="6" height="500" fill="#6366f1"/>

  <!-- Back card -->
  <rect x="110" y="161" width="324" height="260" rx="26" fill="#312e81" filter="url(#shadow)"/>
  <!-- Front card -->
  <rect x="69" y="120" width="324" height="260" rx="26" fill="#4f46e5"/>
  <!-- Shimmer -->
  <rect x="69" y="120" width="324" height="72" rx="26" fill="url(#shimmer)"/>

  <!-- Avatar circle -->
  <circle cx="159" cy="229" r="52" fill="#818cf8"/>
  <!-- Head -->
  <circle cx="159" cy="220" r="19" fill="#ffffff"/>
  <!-- Shoulders -->
  <ellipse cx="159" cy="250" rx="31" ry="16" fill="#ffffff"/>

  <!-- Name line -->
      <rect x="243" y="198" width="117" height="15" rx="7" fill="#ffffff"/>
  <!-- Subtitle lines -->
  <rect x="243" y="239" width="91" height="15" rx="7" fill="#c7d2fe"/>
  <rect x="243" y="276" width="91" height="15" rx="7" fill="#c7d2fe"/>
  <!-- Social dots -->
    <circle cx="166" cy="328" r="13" fill="#a5b4fc"/>
    <circle cx="211" cy="328" r="13" fill="#a5b4fc"/>
    <circle cx="256" cy="328" r="13" fill="#a5b4fc"/>
  
  <!-- Title -->
  <text x="521" y="212"
        font-family="Liberation Sans, Arial, sans-serif" font-weight="bold"
        font-size="80" fill="#f8fafc">Author Profile Blocks</text>

  <!-- Underline -->
    <rect x="521" y="226" width="965" height="8" rx="4" fill="#6366f1"/>

  <!-- Pills -->
        <rect x="521" y="278" width="256" height="66" rx="33" fill="#4f46e5"/>
    <text x="541" y="322"
          font-family="Liberation Sans, Arial, sans-serif" font-size="30" fill="#ffffff">Profile Block</text>
          <rect x="790" y="278" width="223" height="66" rx="33"
          fill="#1e2545" fill-opacity="0.55" stroke="#4a5080" stroke-width="1"/>
    <text x="810" y="322"
          font-family="Liberation Sans, Arial, sans-serif" font-size="30" fill="#94a3b8">Author Grid</text>
          <rect x="1026" y="278" width="206" height="66" rx="33"
          fill="#1e2545" fill-opacity="0.55" stroke="#4a5080" stroke-width="1"/>
    <text x="1046" y="322"
          font-family="Liberation Sans, Arial, sans-serif" font-size="30" fill="#94a3b8">Team Cards</text>
          <rect x="1245" y="278" width="239" height="66" rx="33"
          fill="#1e2545" fill-opacity="0.55" stroke="#4a5080" stroke-width="1"/>
    <text x="1265" y="322"
          font-family="Liberation Sans, Arial, sans-serif" font-size="30" fill="#94a3b8">Social Links</text>
          <rect x="1497" y="278" width="206" height="66" rx="33"
          fill="#1e2545" fill-opacity="0.55" stroke="#4a5080" stroke-width="1"/>
    <text x="1517" y="322"
          font-family="Liberation Sans, Arial, sans-serif" font-size="30" fill="#94a3b8">Responsive</text>
    </svg>
