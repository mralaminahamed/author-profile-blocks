<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
	<!-- Gradient background -->
	<defs>
		<linearGradient id="bg-gradient-hd" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#1e4d92" />
			<stop offset="100%" stop-color="#2271b1" />
		</linearGradient>

		<!-- Frosted glass effect -->
		<filter id="blur-filter-hd" x="-50%" y="-50%" width="200%" height="200%">
			<feGaussianBlur in="SourceGraphic" stdDeviation="20" />
		</filter>

		<!-- Title gradient -->
		<linearGradient id="title-gradient-hd" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#ffffff" />
			<stop offset="100%" stop-color="#f0f6fc" />
		</linearGradient>

		<!-- Glass card inner shadow -->
		<filter id="inner-shadow" x="-50%" y="-50%" width="200%" height="200%">
			<feOffset dx="0" dy="2" />
			<feGaussianBlur stdDeviation="3" result="offset-blur" />
			<feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
			<feFlood flood-color="black" flood-opacity="0.2" result="color" />
			<feComposite operator="in" in="color" in2="inverse" result="shadow" />
			<feComposite operator="over" in="shadow" in2="SourceGraphic" />
		</filter>
	</defs>

	<!-- Main background -->
	<rect width="1544" height="500" fill="url(#bg-gradient-hd)" />

	<!-- Decorative blurred shapes for glassmorphism effect -->
	<circle cx="200" cy="100" r="240" fill="#4d8ac8" opacity="0.3" filter="url(#blur-filter-hd)" />
	<circle cx="1300" cy="400" r="200" fill="#90c2ef" opacity="0.2" filter="url(#blur-filter-hd)" />
	<circle cx="800" cy="550" r="300" fill="#1a3a6a" opacity="0.15" filter="url(#blur-filter-hd)" />

	<!-- Glass card container -->
	<rect x="372" y="100" width="800" height="300" rx="30"
		  fill="rgba(255, 255, 255, 0.15)"
		  stroke="rgba(255, 255, 255, 0.5)"
		  stroke-width="2"
		  filter="url(#inner-shadow)" />

	<!-- Plugin name with gradient -->
	<text x="772" y="180" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="url(#title-gradient-hd)" text-anchor="middle">Author Profile Blocks</text>

	<!-- Modern tagline -->
	<text x="772" y="240" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" text-anchor="middle" letter-spacing="0.8">Beautiful author profiles for WordPress</text>

	<!-- Feature points -->
	<g transform="translate(500, 300)">
		<circle cx="0" cy="0" r="8" fill="#ffffff" />
		<text x="20" y="5" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Custom Author Blocks</text>

		<circle cx="0" cy="40" r="8" fill="#ffffff" />
		<text x="20" y="45" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Team Member Profiles</text>

		<circle cx="350" cy="0" r="8" fill="#ffffff" />
		<text x="370" y="5" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Easy Customization</text>

		<circle cx="350" cy="40" r="8" fill="#ffffff" />
		<text x="370" y="45" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Responsive Design</text>
	</g>

	<!-- Stylized author icon with glassmorphism -->
	<g transform="translate(230, 150)">
		<circle cx="60" cy="60" r="80" fill="rgba(255, 255, 255, 0.2)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" />
		<circle cx="60" cy="40" r="30" fill="rgba(255, 255, 255, 0.9)" />
		<path d="M0,110 Q60,70 120,110" stroke="rgba(255, 255, 255, 0.9)" stroke-width="10" fill="none" stroke-linecap="round" />
	</g>

	<!-- Right side decoration - block icons -->
	<g transform="translate(1250, 200)">
		<rect x="-50" y="-50" width="60" height="60" rx="8"
			  fill="rgba(255, 255, 255, 0.1)"
			  stroke="rgba(255, 255, 255, 0.3)"
			  stroke-width="2" />
		<rect x="20" y="-30" width="60" height="60" rx="8"
			  fill="rgba(255, 255, 255, 0.15)"
			  stroke="rgba(255, 255, 255, 0.3)"
			  stroke-width="2" />
		<rect x="-20" y="20" width="60" height="60" rx="8"
			  fill="rgba(255, 255, 255, 0.2)"
			  stroke="rgba(255, 255, 255, 0.4)"
			  stroke-width="2" />
	</g>

	<!-- Version badge -->
	<g transform="translate(1400, 60)">
		<rect x="0" y="0" width="100" height="40" rx="20" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.5)" stroke-width="2" />
		<text x="50" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">v1.0.0</text>
	</g>

	<!-- WordPress compatibility badge -->
	<g transform="translate(1250, 60)">
		<rect x="0" y="0" width="130" height="40" rx="20" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.5)" stroke-width="2" />
		<text x="65" y="28" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">WP 6.8+ Ready</text>
	</g>
</svg>