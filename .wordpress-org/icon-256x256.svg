<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="shimmer-256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow-256" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="#1e1b4b"/>

  <!-- Back card -->
  <rect x="58" y="58" width="189" height="168" rx="16"
        fill="#312e81" filter="url(#shadow-256)"/>

  <!-- Front card -->
  <rect x="33" y="53" width="189" height="168" rx="16" fill="#4f46e5"/>
  <!-- Shimmer -->
  <rect x="33" y="53" width="189" height="47" rx="16"
        fill="url(#shimmer-256)"/>

  <!-- Avatar circle -->
  <circle cx="85" cy="126" r="33" fill="#818cf8"/>
  <!-- Head -->
  <circle cx="85" cy="121" r="12" fill="#ffffff"/>
  <!-- Shoulders -->
  <ellipse cx="85" cy="139" rx="19" ry="10" fill="#ffffff"/>

  <!-- Name line -->
  <rect x="131" y="103" width="75" height="10" rx="5" fill="#ffffff"/>
  <!-- Subtitle lines -->
  <rect x="131" y="130" width="60" height="10" rx="5" fill="#c7d2fe"/>
  <rect x="131" y="153" width="60" height="10" rx="5" fill="#c7d2fe"/>
</svg>
