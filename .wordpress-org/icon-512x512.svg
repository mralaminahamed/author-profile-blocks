<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!-- Gradient background -->
    <defs>
        <linearGradient id="icon-gradient-512" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e4d92" />
            <stop offset="100%" stop-color="#2271b1" />
        </linearGradient>

        <!-- Frosted glass effect -->
        <filter id="icon-blur-512" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="12" />
        </filter>

        <!-- Inner shadow -->
        <filter id="icon-inner-shadow-512" x="-50%" y="-50%" width="200%" height="200%">
            <feOffset dx="0" dy="4" />
            <feGaussianBlur stdDeviation="4" result="offset-blur" />
            <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
            <feFlood flood-color="black" flood-opacity="0.3" result="color" />
            <feComposite operator="in" in="color" in2="inverse" result="shadow" />
            <feComposite operator="over" in="shadow" in2="SourceGraphic" />
        </filter>

        <!-- Soft glow for profile -->
        <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
            <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color" />
            <feComposite in="color" in2="blur" operator="in" result="shadow" />
            <feComposite in="shadow" in2="SourceGraphic" operator="over" />
        </filter>
    </defs>

    <!-- Main background with rounded corners -->
    <rect width="512" height="512" rx="96" fill="url(#icon-gradient-512)" />

    <!-- Decorative blurred shapes -->
    <circle cx="120" cy="120" r="200" fill="#4d8ac8" opacity="0.2" filter="url(#icon-blur-512)" />
    <circle cx="400" cy="400" r="160" fill="#90c2ef" opacity="0.15" filter="url(#icon-blur-512)" />

    <!-- Glassmorphism overlay -->
    <rect x="56" y="56" width="400" height="400" rx="80"
          fill="rgba(255, 255, 255, 0.1)"
          stroke="rgba(255, 255, 255, 0.3)"
          stroke-width="3"
          filter="url(#icon-inner-shadow-512)" />

    <!-- Stylized author profile icon with enhanced details -->
    <circle cx="256" cy="200" r="88" fill="rgba(255, 255, 255, 0.95)"
            stroke="rgba(255, 255, 255, 0.6)" stroke-width="5"
            filter="url(#soft-glow)" />

    <path d="M152,380 Q256,300 360,380"
          stroke="rgba(255, 255, 255, 0.95)"
          stroke-width="24"
          fill="none"
          stroke-linecap="round"
          filter="url(#soft-glow)" />

    <!-- Block elements with enhanced details -->
    <g transform="translate(256, 432)">
        <rect x="-72" y="-72" width="64" height="64" rx="12"
              fill="rgba(255, 255, 255, 0.8)"
              stroke="rgba(255, 255, 255, 0.4)"
              stroke-width="2" />
        <rect x="8" y="-72" width="64" height="64" rx="12"
              fill="rgba(255, 255, 255, 0.9)"
              stroke="rgba(255, 255, 255, 0.4)"
              stroke-width="2" />
        <rect x="-32" y="8" width="64" height="64" rx="12"
              fill="rgba(255, 255, 255, 0.7)"
              stroke="rgba(255, 255, 255, 0.4)"
              stroke-width="2" />
    </g>
</svg>