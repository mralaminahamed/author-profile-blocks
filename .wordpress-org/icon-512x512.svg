<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shimmer-512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow-512" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1e1b4b"/>

  <!-- Back card -->
  <rect x="116" y="116" width="378" height="337" rx="33"
        fill="#312e81" filter="url(#shadow-512)"/>

  <!-- Front card -->
  <rect x="66" y="106" width="378" height="337" rx="33" fill="#4f46e5"/>
  <!-- Shimmer -->
  <rect x="66" y="106" width="378" height="94" rx="33"
        fill="url(#shimmer-512)"/>

  <!-- Avatar circle -->
  <circle cx="171" cy="254" r="67" fill="#818cf8"/>
  <!-- Head -->
  <circle cx="171" cy="242" r="25" fill="#ffffff"/>
  <!-- Shoulders -->
  <ellipse cx="171" cy="282" rx="40" ry="21" fill="#ffffff"/>

  <!-- Name line -->
  <rect x="262" y="207" width="151" height="20" rx="10" fill="#ffffff"/>
  <!-- Subtitle lines -->
  <rect x="262" y="261" width="121" height="20" rx="10" fill="#c7d2fe"/>
  <rect x="262" y="308" width="121" height="20" rx="10" fill="#c7d2fe"/>
</svg>
