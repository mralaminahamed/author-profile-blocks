name: Sync Assets and Readme to WordPress.org

on:
  push:
    branches:
      - trunk
    paths:
      - 'readme.txt'
      - '.wordpress-org/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: assets-deploy
  cancel-in-progress: true

jobs:
  sync:
    name: Sync assets and readme
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set plugin slug
        id: plugin
        run: echo "slug=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT

      - name: Sync assets and readme.txt to WordPress.org
        uses: 10up/action-wordpress-plugin-asset-update@2.2.0
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ steps.plugin.outputs.slug }}
