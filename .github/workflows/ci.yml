name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [trunk, develop]

jobs:
  test:
    name: Test PHP ${{ matrix.php }} / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.1", "8.2", "8.3"]
        wp: ["latest"]
        include:
          - php: "8.1"
            wp: "6.0"
          - php: "8.2"
            wp: "latest"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, bcmath, exif, gd, mysqli, opcache, zip, pdo_mysql
          coverage: xdebug
          tools: composer:v2, phpunit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: node-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Install PHP dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node.js dependencies
        run: |
          yarn install --frozen-lockfile

      - name: Build assets
        run: |
          yarn build

      - name: Run PHP linting
        run: composer phpcs

      - name: Run PHPStan static analysis
        run: composer phpstan

      - name: Setup WordPress test environment
        run: |
          bash tests/php/bin/install-wp-tests.sh wordpress_test root '' localhost latest

      - name: Run PHP unit tests
        run: composer test
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib

      - name: Upload coverage to Codecov
        if: matrix.php == '8.1' && matrix.wp == 'latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: php
          name: php-coverage

  lint-js:
    name: Lint JavaScript/CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install Node.js dependencies
        run: |
          yarn install --frozen-lockfile

      - name: Run JavaScript/CSS linting
        run: yarn lint

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
