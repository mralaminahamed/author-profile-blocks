---
name: 🎨 Block Enhancement
description: Suggest improvements or enhancements to existing blocks
title: "[Enhancement]: "
labels: ["enhancement", "block-improvement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🎨 Block Enhancement

        Help us improve existing blocks! This template is for enhancements to current functionality.

  - type: dropdown
    id: block-type
    attributes:
      label: Block to Enhance
      description: Which block would you like to enhance?
      options:
        - Author Profile Block
        - Author Grid Block
        - Author List Block
        - Author Carousel Block
    validations:
      required: true

  - type: dropdown
    id: enhancement-type
    attributes:
      label: Enhancement Type
      description: What type of enhancement are you suggesting?
      options:
        - New styling option
        - New layout option
        - New content field
        - Performance improvement
        - Accessibility improvement
        - Mobile responsiveness
        - Editor experience
        - Other (please specify)
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: How does the block currently work?
      placeholder: Describe the current functionality
    validations:
      required: true

  - type: textarea
    id: desired-behavior
    attributes:
      label: Desired Behavior
      description: How would you like it to work?
      placeholder: Describe the enhancement in detail
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: When would this enhancement be useful?
      placeholder: Describe a specific scenario where this would be beneficial
    validations:
      required: true

  - type: textarea
    id: implementation-ideas
    attributes:
      label: Implementation Ideas
      description: Any ideas on how this could be implemented?
      placeholder: Technical suggestions, UI mockups, etc.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this enhancement?
      options:
        - Nice to have
        - Would be helpful
        - Important for my use case
        - Critical for accessibility/usability
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Screenshots, examples, or additional information
      placeholder: Add any other context or examples

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please check the following
      options:
        - label: I have searched existing issues to make sure this is not a duplicate
          required: true
        - label: This enhancement would benefit other users
        - label: I am willing to help test this enhancement when it's implemented