<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background with gradient -->
    <defs>
        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f0f4ff" />
            <stop offset="100%" stop-color="#e0e7ff" />
        </linearGradient>
        <linearGradient id="card-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#f8fafc" />
        </linearGradient>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15" />
        </filter>
    </defs>

    <!-- Main background -->
    <rect width="1200" height="400" rx="12" fill="url(#bg-gradient)" />

    <!-- Decorative elements -->
    <circle cx="100" cy="80" r="60" fill="#4c6ef5" fill-opacity="0.1" />
    <circle cx="1100" cy="320" r="80" fill="#4c6ef5" fill-opacity="0.1" />
    <path d="M0,250 Q300,150 600,270 T1200,180" fill="none" stroke="#4c6ef5" stroke-opacity="0.2" stroke-width="6" />

    <!-- Plugin Title -->
    <text x="600" y="80" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#212529">Author Profile Blocks</text>
    <text x="600" y="120" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#495057">Showcase your WordPress users with beautiful Gutenberg blocks</text>

    <!-- Block Preview Cards -->
    <!-- Profile Block -->
    <rect x="100" y="160" width="220" height="180" rx="10" fill="url(#card-gradient)" stroke="#e9ecef" stroke-width="2" filter="url(#shadow)" />
    <circle cx="160" cy="200" r="30" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" />
    <path d="M160 188 Q172 188 172 198 Q172 208 160 208 Q148 208 148 198 Q148 188 160 188" fill="#94a3b8" />
    <circle cx="160" cy="218" r="15" fill="#94a3b8" />
    <rect x="210" y="180" width="80" height="14" rx="3" fill="#94a3b8" />
    <rect x="210" y="200" width="60" height="8" rx="2" fill="#cbd5e1" />
    <rect x="130" y="240" width="160" height="6" rx="2" fill="#cbd5e1" />
    <rect x="130" y="250" width="150" height="6" rx="2" fill="#cbd5e1" />
    <rect x="130" y="260" width="140" height="6" rx="2" fill="#cbd5e1" />
    <circle cx="150" cy="280" r="5" fill="#3b82f6" />
    <circle cx="165" cy="280" r="5" fill="#1da1f2" />
    <circle cx="180" cy="280" r="5" fill="#0a66c2" />
    <text x="210" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">Profile</text>

    <!-- Grid Block -->
    <rect x="360" y="160" width="220" height="180" rx="10" fill="url(#card-gradient)" stroke="#e9ecef" stroke-width="2" filter="url(#shadow)" />
    <rect x="380" y="180" width="80" height="70" rx="5" fill="#f8fafc" stroke="#e9ecef" stroke-width="1" />
    <circle cx="405" cy="200" r="10" fill="#cbd5e1" />
    <rect x="390" y="220" width="60" height="6" rx="2" fill="#94a3b8" />
    <rect x="395" y="230" width="50" height="4" rx="1" fill="#cbd5e1" />
    <rect x="480" y="180" width="80" height="70" rx="5" fill="#f8fafc" stroke="#e9ecef" stroke-width="1" />
    <circle cx="505" cy="200" r="10" fill="#cbd5e1" />
    <rect x="490" y="220" width="60" height="6" rx="2" fill="#94a3b8" />
    <rect x="495" y="230" width="50" height="4" rx="1" fill="#cbd5e1" />
    <rect x="380" y="260" width="80" height="70" rx="5" fill="#f8fafc" stroke="#e9ecef" stroke-width="1" />
    <circle cx="405" cy="280" r="10" fill="#cbd5e1" />
    <rect x="390" y="300" width="60" height="6" rx="2" fill="#94a3b8" />
    <rect x="395" y="310" width="50" height="4" rx="1" fill="#cbd5e1" />
    <rect x="480" y="260" width="80" height="70" rx="5" fill="#f8fafc" stroke="#e9ecef" stroke-width="1" />
    <circle cx="505" cy="280" r="10" fill="#cbd5e1" />
    <rect x="490" y="300" width="60" height="6" rx="2" fill="#94a3b8" />
    <rect x="495" y="310" width="50" height="4" rx="1" fill="#cbd5e1" />
    <text x="470" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">Grid</text>

    <!-- Carousel Block -->
    <rect x="620" y="160" width="220" height="180" rx="10" fill="url(#card-gradient)" stroke="#e9ecef" stroke-width="2" filter="url(#shadow)" />
    <rect x="640" y="180" width="180" height="120" rx="5" fill="#f8fafc" stroke="#e9ecef" stroke-width="1" />
    <circle cx="640" cy="240" r="15" fill="white" stroke="#cbd5e1" stroke-width="1" />
    <path d="M645 235 L635 240 L645 245" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    <circle cx="820" cy="240" r="15" fill="white" stroke="#cbd5e1" stroke-width="1" />
    <path d="M815 235 L825 240 L815 245" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    <circle cx="730" cy="220" r="20" fill="#e2e8f0" />
    <rect x="700" y="250" width="60" height="6" rx="2" fill="#94a3b8" />
    <rect x="710" y="260" width="40" height="4" rx="1" fill="#cbd5e1" />
    <circle cx="720" cy="310" r="4" fill="#cbd5e1" />
    <circle cx="730" cy="310" r="4" fill="#3b82f6" />
    <circle cx="740" cy="310" r="4" fill="#cbd5e1" />
    <text x="730" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">Carousel</text>

    <!-- List Block -->
    <rect x="880" y="160" width="220" height="180" rx="10" fill="url(#card-gradient)" stroke="#e9ecef" stroke-width="2" filter="url(#shadow)" />
    <rect x="900" y="180" width="180" height="40" rx="5" fill="#f8fafc" stroke="#e9ecef" stroke-width="1" />
    <circle cx="920" cy="200" r="12" fill="#e2e8f0" />
    <rect x="940" y="195" width="100" height="6" rx="2" fill="#94a3b8" />
    <rect x="940" y="205" width="60" height="4" rx="1" fill="#cbd5e1" />
    <rect x="900" y="230" width="180" height="40" rx="5" fill="#f8fafc" stroke="#e9ecef" stroke-width="1" />
    <circle cx="920" cy="250" r="12" fill="#e2e8f0" />
    <rect x="940" y="245" width="100" height="6" rx="2" fill="#94a3b8" />
    <rect x="940" y="255" width="60" height="4" rx="1" fill="#cbd5e1" />
    <rect x="900" y="280" width="180" height="40" rx="5" fill="#f8fafc" stroke="#e9ecef" stroke-width="1" />
    <circle cx="920" cy="300" r="12" fill="#e2e8f0" />
    <rect x="940" y="295" width="100" height="6" rx="2" fill="#94a3b8" />
    <rect x="940" y="305" width="60" height="4" rx="1" fill="#cbd5e1" />
    <text x="990" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">List</text>

    <!-- WordPress Logo -->
    <circle cx="45" cy="350" r="25" fill="#3858e9" fill-opacity="0.2" />
    <path d="M45,330 C34.5,330 26,338.5 26,349 C26,359.5 34.5,368 45,368 C55.5,368 64,359.5 64,349 C64,338.5 55.5,330 45,330 Z M30,349 C30,353 31.5,356.5 34,359 L45,335 C36.5,336 30,341.5 30,349 Z M45,364 C47.5,364 50,363.5 52,362.5 L51.5,361.5 L46,350 L40.5,366 C42,365.5 43.5,365 45,364 Z M57,343.5 C58,345.5 58.5,347 58.5,349 C58.5,354 56,358.5 52,361 L57,343.5 Z" fill="#3858e9" />

    <!-- Version Info -->
    <text x="1150" y="380" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#6c757d">v1.0.0</text>
</svg>