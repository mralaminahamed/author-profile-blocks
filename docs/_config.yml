title: Author Profile Blocks
description: Documentation for Author Profile Blocks WordPress plugin
logo: "/assets/images/logo.svg"
remote_theme: just-the-docs/just-the-docs@v0.5.3

# Color scheme
color_scheme: apb

# Enable dark mode toggle
enable_dark_mode_toggle: true

# Enable custom copy button for code blocks
enable_copy_code_button: true

# Enable or disable the site search
search_enabled: true
search:
  # Split pages into sections that can be searched individually
  heading_level: 2
  # Maximum amount of previews per search result
  previews: 3
  # Maximum amount of words to display before a matched word in the preview
  preview_words_before: 5
  # Maximum amount of words to display after a matched word in the preview
  preview_words_after: 10
  # Display the relative url in search results
  rel_url: true
  # Enable search in collections like callouts and tabs
  collections: true
  # Display search button
  button: true

# Aux links for the upper right navigation
aux_links:
  "Author Profile Blocks on GitHub":
    - "https://github.com/mralaminahamed/author-profile-blocks"
  "WordPress Plugin Page":
    - "https://wordpress.org/plugins/author-profile-blocks/"

# Makes Aux links open in a new tab
aux_links_new_tab: true

# Sort order for navigation links
nav_sort: case_insensitive

# Footer content
footer_content: "Copyright &copy; 2023-2025 Al Amin Ahamed. Distributed by an <a href=\"https://github.com/mralaminahamed/author-profile-blocks/blob/master/LICENSE\">GPL-2.0 license.</a>"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Custom callout styling
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red
  tip:
    title: Tip
    color: green
  new:
    title: New
    color: purple

# Enable collapsible navigation
collapse_navigation: true

# Heading anchor links
heading_anchors: true

# Compress CSS
compress_css: true

# Compress HTML
compress_html: true

# Compress JS
compress_js: true

# Google Analytics tracking
ga_tracking: UA-XXXXXXXXX-X
ga_tracking_anonymize_ip: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Define custom collections if needed
collections:
  tutorials:
    output: true
    permalink: /:collection/:path/

# Configure defaults for specific collections
defaults:
  - scope:
      path: ""
      type: "tutorials"
    values:
      layout: "tutorial"